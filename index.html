<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F5F0E8">
<title>VocaWithNuance</title>
<link rel="icon" href="app_icon.png">
<link rel="apple-touch-icon" href="app_icon.png">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Noto+Serif+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
<style>
:root {
  --cream: #F5F0E8;
  --ink-blue: #2B5F8A;
  --ink-purple: #7B4A8D;
  --ink-rose: #9B4D5A;
  --ink-olive: #6B7B3A;
  --ink-slate: #5A6B7B;
  --paper: rgba(255,253,248,0.7);
  --border: rgba(216,208,196,0.5);
  --text: #3A3530;
  --text-light: #7A7268;
  --text-muted: #9A9288;
  --text-faint: #B0A99A;
  --highlight-blue: rgba(43,95,138,0.04);
  --highlight-purple: rgba(123,74,141,0.03);
  --highlight-rose: rgba(155,77,90,0.03);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { 
  background: var(--cream); 
  font-family: 'Noto Serif KR', -apple-system, sans-serif;
  color: var(--text);
  min-height: 100vh;
  overscroll-behavior: none;
}
::selection { background: rgba(123,74,141,0.2); }

#app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  padding-bottom: env(safe-area-inset-bottom, 20px);
}

/* --- Screens --- */
.screen { display: none; padding: 20px; }
.screen.active { display: block; animation: fadeIn 0.35s ease-out; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

/* --- Home --- */
.home-logo { text-align: center; padding: 28px 0 24px; }
.home-logo .mark {
  font-family: 'Cormorant Garamond', serif;
  font-size: 52px; font-weight: 300; font-style: italic;
  background: linear-gradient(135deg, #2B5F8A, #7B4A8D, #9B4D5A);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.home-logo h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px; font-weight: 400; color: #4A5A6A;
}
.home-logo .sub { font-size: 12px; color: var(--text-faint); letter-spacing: 2px; }

.tier-list { margin-bottom: 24px; }
.tier-item {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; border: none; background: none;
  border-left: 3px solid; border-radius: 0 6px 6px 0;
  cursor: pointer; width: 100%; text-align: left;
  font-family: inherit; transition: background 0.2s;
}
.tier-item.selected { background: rgba(43,95,138,0.06); }
.tier-item .t-label { font-size: 14px; font-weight: 600; min-width: 52px; }
.tier-item .t-count { font-size: 12px; color: var(--text-light); flex: 1; }
.tier-item .t-desc { font-size: 12px; color: var(--text-muted); }

.action-col { display: flex; flex-direction: column; gap: 10px; }
.btn-primary {
  padding: 14px; background: var(--ink-blue); color: var(--cream);
  border: none; border-radius: 8px; font-size: 15px; font-weight: 500;
  cursor: pointer; font-family: inherit; display: flex; align-items: center;
  justify-content: center; gap: 10px; position: relative;
}
.btn-secondary {
  padding: 14px; background: none; color: var(--ink-purple);
  border: 1px solid var(--ink-purple); border-radius: 8px;
  font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.btn-tertiary {
  padding: 14px; background: none; color: var(--ink-rose);
  border: 1px solid #D8D0C4; border-radius: 8px;
  font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  position: relative;
}
.btn-icon { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 300; }
.badge {
  position: absolute; right: 16px;
  background: var(--ink-rose); color: var(--cream);
  font-size: 11px; font-weight: 600; border-radius: 10px;
  padding: 2px 8px; min-width: 20px; text-align: center;
}

/* --- Loading --- */
.loading-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(245,240,232,0.95); display: flex;
  flex-direction: column; align-items: center; justify-content: center;
  z-index: 100;
}
.loading-spinner {
  width: 40px; height: 40px; border: 2px solid #E8E2D8;
  border-top-color: var(--ink-purple); border-radius: 50%;
  animation: spin 1s linear infinite; margin-bottom: 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: var(--text-light); }
.loading-progress { 
  width: 200px; height: 2px; background: #E8E2D8; 
  border-radius: 1px; margin-top: 12px; overflow: hidden;
}
.loading-progress-fill { 
  height: 100%; background: var(--ink-purple); 
  transition: width 0.3s; border-radius: 1px;
}

/* --- Top Bar & Progress --- */
.top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.back-btn { background: none; border: none; color: var(--text-light); font-size: 14px; cursor: pointer; font-family: inherit; }
.counter { font-size: 13px; color: var(--text-muted); font-family: 'Cormorant Garamond', serif; }
.star-btn { background: none; border: none; font-size: 24px; cursor: pointer; transition: color 0.2s; }
.progress-bar { width: 100%; height: 2px; background: #E8E2D8; border-radius: 1px; margin-bottom: 24px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 1px; transition: width 0.4s ease; }

/* --- Word Card & Learn --- */
.word-card {
  background: var(--paper); border-radius: 12px; padding: 32px 24px 28px;
  text-align: center; box-shadow: 0 1px 8px rgba(58,53,48,0.06);
  border: 1px solid var(--border); margin-bottom: 20px;
  animation: slideUp 0.4s ease-out;
}
.word-main { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 400; color: #2A2520; letter-spacing: -1px; margin-bottom: 6px; }
.word-pron { font-family: 'Cormorant Garamond', serif; font-size: 15px; font-style: italic; color: var(--text-light); margin-bottom: 20px; }
.reveal-btn {
  padding: 12px 40px; background: none; border: 1px solid #C8C0B4;
  border-radius: 24px; color: #6A6258; font-size: 14px;
  cursor: pointer; font-family: inherit; letter-spacing: 1px;
}
.detail-area { text-align: left; animation: slideUp 0.3s ease-out; }
.meaning-box { background: var(--highlight-blue); border-radius: 8px; padding: 14px 16px; margin-bottom: 16px; border-left: 2px solid var(--ink-blue); }
.section-tag { font-size: 10px; font-weight: 600; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
.meaning-text { font-size: 15px; line-height: 1.7; }

.tag-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 12px; }
.tag-label { font-size: 11px; color: var(--text-muted); font-weight: 500; min-width: 36px; letter-spacing: 1px; }
.syn-tag { font-size: 12px; background: rgba(107,123,58,0.1); color: #5A6B3A; padding: 3px 10px; border-radius: 12px; border: 1px solid rgba(107,123,58,0.2); }
.ant-tag { font-size: 12px; background: rgba(155,77,90,0.08); color: #8B4050; padding: 3px 10px; border-radius: 12px; border: 1px solid rgba(155,77,90,0.15); }
.example-box { background: var(--highlight-purple); border-radius: 8px; padding: 14px 16px; margin-bottom: 12px; border-left: 2px solid var(--ink-purple); }
.example-text { font-size: 13px; line-height: 1.7; color: #5A5348; font-style: italic; font-family: 'Cormorant Garamond', serif; margin-bottom: 6px; }
.etym-box { background: var(--highlight-rose); border-radius: 8px; padding: 14px 16px; border-left: 2px solid var(--ink-rose); }
.etym-text { font-size: 13px; line-height: 1.6; color: #6A6258; }

.learn-actions { display: flex; gap: 12px; }
.know-btn { flex: 1; padding: 14px; background: var(--ink-olive); color: var(--cream); border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit; }
.dont-know-btn { flex: 1; padding: 14px; background: none; color: var(--ink-rose); border: 1px solid var(--ink-rose); border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit; }

/* --- Quiz & Result --- */
.quiz-options { display: flex; flex-direction: column; gap: 10px; margin-top: 24px; text-align: left; }
.quiz-option {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 14px 16px; background: none;
  border: 1px solid #D8D0C4; border-radius: 8px;
  cursor: pointer; font-family: inherit; font-size: 14px;
  line-height: 1.5; transition: all 0.2s; text-align: left;
}
.quiz-option.correct { background: rgba(107,123,58,0.12); border-color: var(--ink-olive); }
.quiz-option.wrong { background: rgba(155,77,90,0.12); border-color: var(--ink-rose); }
.option-num { font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 500; color: var(--text-muted); min-width: 20px; }
.option-text { flex: 1; }
.next-quiz-btn { margin-top: 20px; width: 100%; padding: 14px; background: var(--ink-purple); color: var(--cream); border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit; }

.result-container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; text-align: center; }
.result-circle { width: 140px; height: 140px; border-radius: 50%; border: 3px solid var(--ink-purple); display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 24px; }
.result-score { font-family: 'Cormorant Garamond', serif; font-size: 48px; font-weight: 300; color: var(--ink-purple); }
.result-total { font-family: 'Cormorant Garamond', serif; font-size: 18px; color: var(--text-muted); }
.result-title { font-size: 22px; font-weight: 500; margin-bottom: 8px; }
.result-sub { font-size: 14px; color: var(--text-light); line-height: 1.6; }
.result-actions { display: flex; gap: 12px; margin-top: 32px; }

/* --- Review & Search --- */
.search-box { display: flex; align-items: center; gap: 8px; background: var(--paper); border: 1px solid #D8D0C4; border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; }
.search-box input { flex: 1; border: none; background: none; font-size: 14px; font-family: inherit; color: var(--text); outline: none; }
.clear-btn { background: none; border: none; color: var(--text-muted); font-size: 16px; cursor: pointer; }
.search-results { background: rgba(43,95,138,0.03); border: 1px solid rgba(43,95,138,0.1); border-radius: 8px; margin-bottom: 16px; max-height: 200px; overflow-y: auto; }
.sr-title { font-size: 11px; color: var(--ink-blue); font-weight: 600; letter-spacing: 1px; padding: 8px 14px; }
.sr-item { display: flex; align-items: center; padding: 8px 14px; gap: 8px; border-bottom: 1px solid rgba(216,208,196,0.3); }
.sr-word { font-family: 'Cormorant Garamond', serif; font-size: 15px; font-weight: 500; margin-right: 8px; }
.sr-meaning { font-size: 12px; color: var(--text-light); flex: 1; }
.mini-star { background: none; border: none; font-size: 20px; cursor: pointer; transition: color 0.2s; }
.review-card { background: var(--paper); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; overflow: hidden; animation: slideUp 0.3s ease-out; }
.review-header { display: flex; align-items: center; padding: 14px 16px; cursor: pointer; gap: 8px; }
.review-word { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 500; margin-right: 10px; }
.review-pron { font-family: 'Cormorant Garamond', serif; font-size: 13px; font-style: italic; color: var(--text-muted); flex: 1; }
.chevron { font-size: 20px; color: var(--text-faint); transition: transform 0.2s; font-family: monospace; }
.chevron.open { transform: rotate(90deg); }
.review-detail { padding: 0 16px 16px; animation: slideUp 0.2s ease-out; }
.review-meaning { font-size: 14px; line-height: 1.7; margin-bottom: 12px; }
.empty-state { text-align: center; padding: 60px 20px; }
.empty-icon { font-size: 40px; color: #D8D0C4; margin-bottom: 16px; }
.empty-text { font-size: 14px; color: var(--text-muted); line-height: 1.8; }
</style>
</head>
<body>
<div id="app">

<!-- Loading Overlay -->
<div class="loading-overlay" id="loading" style="display:none">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loading-text">데이터를 불러오는 중...</div>
  <div class="loading-progress"><div class="loading-progress-fill" id="loading-fill" style="width:0%"></div></div>
</div>

<!-- HOME -->
<div class="screen" id="screen-home">
  <div class="home-logo">
    <div class="mark">W</div>
    <h1>voca<span style="color:#7B4A8D">with</span>nuance</h1>
    <div class="sub">뉘앙스와 함께 배우는 어휘</div>
  </div>
  <div class="tier-list" id="tier-list"></div>
  <div class="action-col">
    <button class="btn-primary" onclick="startLearn()"><span class="btn-icon">本</span> 학습하기</button>
    <button class="btn-secondary" onclick="startQuiz()"><span class="btn-icon">試</span> 테스트</button>
    <button class="btn-tertiary" onclick="showScreen('review')">
      <span class="btn-icon">★</span> 다시보기
      <span class="badge" id="bookmark-badge" style="display:none">0</span>
    </button>
  </div>
</div>

<!-- LEARN -->
<div class="screen" id="screen-learn"></div>
<!-- QUIZ -->
<div class="screen" id="screen-quiz"></div>
<!-- QUIZ RESULT -->
<div class="screen" id="screen-result"></div>
<!-- REVIEW -->
<div class="screen" id="screen-review"></div>

</div>

<script>
// --- Config ---
const TIERS = {
  1: { label: 'Tier 1', count: '14,611', desc: '핵심 고빈도', color: '#2B5F8A' },
  2: { label: 'Tier 2', count: '19,844', desc: '중급 필수', color: '#7B4A8D' },
  3: { label: 'Tier 3', count: '25,859', desc: '고급 확장', color: '#9B4D5A' },
  4: { label: 'Tier 4', count: '33,490', desc: '전문 심화', color: '#6B7B3A' },
  5: { label: 'Tier 5', count: '275,650', desc: '전체 마스터', color: '#5A6B7B' },
};

let selectedTier = 1;
let db = null;
let SQL = null;
let words = [];
let learnIdx = 0;
let quizWords = [];
let quizIdx = 0;
let quizAnswer = null;
let quizScore = { correct: 0, total: 0 };
let bookmarks = {};
let showingDetail = false;

// --- Init ---
window.onload = async function() {
  await init();
};

async function init() {
  try { bookmarks = JSON.parse(localStorage.getItem('vwn-bookmarks') || '{}'); } catch {}
  updateBadge();
  
  SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${f}` });
  
  renderTierList();
  showScreen('home');
  
  if (await isCached(selectedTier)) loadTier(selectedTier);
}

function renderTierList() {
  const el = document.getElementById('tier-list');
  el.innerHTML = '';
  for (const [t, info] of Object.entries(TIERS)) {
    const div = document.createElement('button');
    div.className = `tier-item${selectedTier == t ? ' selected' : ''}`;
    div.style.borderLeftColor = info.color;
    div.innerHTML = `
      <div class="t-label" style="color:${info.color}">${info.label}</div>
      <div class="t-count">${info.count}단어</div>
      <div class="t-desc">${info.desc}</div>
    `;
    div.onclick = () => { selectedTier = parseInt(t); renderTierList(); };
    el.appendChild(div);
  }
}

// --- IndexedDB Cache ---
function openCache() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('vwn-cache', 1);
    req.onupgradeneeded = () => req.result.createObjectStore('dbs');
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function isCached(tier) {
  try {
    const cacheDB = await openCache();
    return new Promise(resolve => {
      const tx = cacheDB.transaction('dbs', 'readonly');
      const req = tx.objectStore('dbs').get(`tier-${tier}`);
      req.onsuccess = () => resolve(!!req.result);
      req.onerror = () => resolve(false);
    });
  } catch { return false; }
}

async function getCached(tier) {
  const cacheDB = await openCache();
  return new Promise((resolve, reject) => {
    const tx = cacheDB.transaction('dbs', 'readonly');
    const req = tx.objectStore('dbs').get(`tier-${tier}`);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function setCache(tier, data) {
  const cacheDB = await openCache();
  return new Promise((resolve, reject) => {
    const tx = cacheDB.transaction('dbs', 'readwrite');
    tx.objectStore('dbs').put(data, `tier-${tier}`);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

// --- Load Tier ---
async function loadTier(tier) {
  showLoading('데이터를 불러오는 중...');
  try {
    const cached = await getCached(tier);
    if (cached) {
      setLoadingProgress(80);
      setLoadingText('데이터베이스 로딩 중...');
      db = new SQL.Database(new Uint8Array(cached));
      loadWords();
      hideLoading();
      return;
    }
    
    setLoadingText(`Tier ${tier} 다운로드 중...`);
    const resp = await fetch(`data/voca_t${tier}.db.gz`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    
    const reader = resp.body.getReader();
    const contentLength = +resp.headers.get('Content-Length') || 0;
    let received = 0;
    const chunks = [];
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
      received += value.length;
      if (contentLength) setLoadingProgress(Math.round(received / contentLength * 60));
    }
    
    setLoadingProgress(60);
    setLoadingText('압축 해제 중...');
    const blob = new Blob(chunks);
    const arrayBuf = await blob.arrayBuffer();
    const ds = new DecompressionStream('gzip');
    const writer = ds.writable.getWriter();
    writer.write(new Uint8Array(arrayBuf));
    writer.close();
    const decompressed = await new Response(ds.readable).arrayBuffer();
    
    setLoadingProgress(80);
    setLoadingText('데이터베이스 로딩 중...');
    await setCache(tier, decompressed);
    db = new SQL.Database(new Uint8Array(decompressed));
    loadWords();
    hideLoading();
  } catch (err) {
    hideLoading();
    alert(`데이터 로딩 실패: ${err.message}`);
  }
}

function loadWords() {
  if (!db) return;
  const results = db.exec('SELECT id, word, meaning, pronunciation, examples, synonyms, antonyms, etymology, nuance FROM words ORDER BY RANDOM()');
  if (!results.length) return;
  words = results[0].values.map(r => ({
    id: r[0], w: r[1], m: r[2] || '', p: r[3] || '',
    e: safeJSON(r[4]), s: safeJSON(r[5]), a: safeJSON(r[6]),
    et: (r[7] || '').slice(0, 200), n: safeNuance(r[8])
  }));
}

function safeJSON(s) {
  if (!s) return [];
  try { const r = JSON.parse(s); return Array.isArray(r) ? r.slice(0, 3) : []; } catch { return []; }
}

function safeNuance(s) {
  if (!s) return '';
  try { const n = JSON.parse(s); return typeof n === 'object' ? (n.reason || '') : String(n).slice(0, 300); } catch { return String(s).slice(0, 300); }
}

// --- UI Management ---
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(`screen-${name}`);
  if (el) el.classList.add('active');
  if (name === 'review') renderReview();
}

function showLoading(text) {
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('loading-text').textContent = text;
  document.getElementById('loading-fill').style.width = '0%';
}
function setLoadingText(t) { document.getElementById('loading-text').textContent = t; }
function setLoadingProgress(p) { document.getElementById('loading-fill').style.width = p + '%'; }
function hideLoading() { document.getElementById('loading').style.display = 'none'; }

// --- Learn ---
async function startLearn() {
  if (!db || words.length === 0) await loadTier(selectedTier);
  if (words.length === 0) return;
  learnIdx = 0;
  showingDetail = false;
  renderLearn();
  showScreen('learn');
}

function renderLearn() {
  const w = words[learnIdx];
  if (!w) return;
  const isBookmarked = !!bookmarks[w.w];
  let detailHTML = '';
  if (showingDetail) {
    detailHTML = `
      <div class="detail-area">
        <div class="meaning-box">
          <div class="section-tag">의미</div>
          <div class="meaning-text">${esc(w.m)}</div>
        </div>
        ${w.s.length ? `<div class="tag-row"><span class="tag-label">유의어</span>${w.s.map(s => `<span class="syn-tag">${esc(s)}</span>`).join('')}</div>` : ''}
        ${w.a.length ? `<div class="tag-row"><span class="tag-label">반의어</span>${w.a.map(a => `<span class="ant-tag">${esc(a)}</span>`).join('')}</div>` : ''}
        ${w.e.length ? `<div class="example-box"><div class="section-tag">예문</div>${w.e.map(e => `<p class="example-text">"${esc(e)}"</p>`).join('')}</div>` : ''}
        ${w.et ? `<div class="etym-box"><div class="section-tag">어원</div><p class="etym-text">${esc(w.et)}</p></div>` : ''}
      </div>`;
  } else {
    detailHTML = `<button class="reveal-btn" onclick="showingDetail=true;renderLearn()">뜻 보기</button>`;
  }
  
  document.getElementById('screen-learn').innerHTML = `
    <div class="top-bar">
      <button class="back-btn" onclick="showScreen('home')">← 홈</button>
      <span class="counter">${learnIdx + 1} / ${words.length}</span>
      <button class="star-btn" style="color:${isBookmarked ? '#9B4D5A' : '#C8C0B4'}" onclick="toggleBookmark(words[${learnIdx}]);renderLearn()">★</button>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${((learnIdx+1)/words.length*100)}%;background:#2B5F8A"></div></div>
    <div class="word-card">
      <div class="word-main">${esc(w.w)}</div>
      <div class="word-pron">${esc(w.p)}</div>
      ${detailHTML}
    </div>
    <div class="learn-actions">
      <button class="know-btn" onclick="nextLearnWord(true)">알아요 →</button>
      <button class="dont-know-btn" onclick="nextLearnWord(false)">몰라요 ★</button>
    </div>`;
}

function nextLearnWord(known) {
  const w = words[learnIdx];
  if (!known && !bookmarks[w.w]) toggleBookmark(w);
  showingDetail = false;
  if (learnIdx < words.length - 1) {
    learnIdx++;
    renderLearn();
  } else {
    showScreen('home');
  }
}

// --- Quiz ---
async function startQuiz() {
  if (!db || words.length === 0) await loadTier(selectedTier);
  if (words.length === 0) return;
  const shuffled = shuffle([...words]);
  quizWords = shuffled.slice(0, 10).map(w => {
    const wrongs = shuffle(words.filter(x => x.id !== w.id)).slice(0, 3).map(x => x.m);
    const options = shuffle([w.m, ...wrongs]);
    return { ...w, options, correctIdx: options.indexOf(w.m) };
  });
  quizIdx = 0;
  quizAnswer = null;
  quizScore = { correct: 0, total: 0 };
  renderQuiz();
  showScreen('quiz');
}

function renderQuiz() {
  const w = quizWords[quizIdx];
  if (!w) return;
  document.getElementById('screen-quiz').innerHTML = `
    <div class="top-bar">
      <button class="back-btn" onclick="showScreen('home')">← 홈</button>
      <span class="counter">${quizScore.correct}/${quizScore.total} 정답</span>
      <span class="counter">${quizIdx + 1}/${quizWords.length}</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${((quizIdx+1)/quizWords.length*100)}%;background:#7B4A8D"></div></div>
    <div class="word-card">
      <div class="word-main">${esc(w.w)}</div>
      <div class="word-pron">${esc(w.p)}</div>
      <div class="quiz-options">
        ${w.options.map((opt, i) => {
          let cls = '';
          if (quizAnswer !== null) {
            if (i === w.correctIdx) cls = 'correct';
            else if (i === quizAnswer) cls = 'wrong';
          }
          return `<button class="quiz-option ${cls}" onclick="answerQuiz(${i})">
            <span class="option-num">${String.fromCharCode(65 + i)}</span>
            <span class="option-text">${esc(opt)}</span>
          </button>`;
        }).join('')}
      </div>
      ${quizAnswer !== null ? `<button class="next-quiz-btn" onclick="nextQuiz()">${quizIdx < quizWords.length - 1 ? '다음 →' : '결과 보기'}</button>` : ''}
    </div>`;
}

function answerQuiz(idx) {
  if (quizAnswer !== null) return;
  quizAnswer = idx;
  const correct = idx === quizWords[quizIdx].correctIdx;
  quizScore.correct += correct ? 1 : 0;
  quizScore.total += 1;
  if (!correct) toggleBookmark(quizWords[quizIdx]);
  renderQuiz();
}

function nextQuiz() {
  if (quizIdx < quizWords.length - 1) {
    quizIdx++;
    quizAnswer = null;
    renderQuiz();
  } else {
    renderResult();
    showScreen('result');
  }
}

function renderResult() {
  const msg = quizScore.correct === quizScore.total ? '완벽해요!' : quizScore.correct >= quizScore.total * 0.7 ? '잘했어요!' : '더 노력해봐요!';
  document.getElementById('screen-result').innerHTML = `
    <div class="result-container">
      <div class="result-circle">
        <div class="result-score">${quizScore.correct}</div>
        <div class="result-total">/ ${quizScore.total}</div>
      </div>
      <h2 class="result-title">${msg}</h2>
      <div class="result-actions">
        <button class="btn-primary" onclick="startQuiz()">다시 도전</button>
        <button class="btn-secondary" onclick="showScreen('home')">홈으로</button>
      </div>
    </div>`;
}

// --- Review ---
function renderReview(query = '') {
  const bm = Object.values(bookmarks);
  let searchHTML = '';
  if (query.length >= 2 && db) {
    try {
      const q = query.replace(/'/g, "''");
      const results = db.exec(`SELECT id, word, meaning, pronunciation, examples, synonyms, antonyms, etymology FROM words WHERE word LIKE '%${q}%' LIMIT 20`);
      if (results.length && results[0].values.length) {
        searchHTML = `<div class="search-results"><div class="sr-title">전체 검색 결과</div>`;
        for (const r of results[0].values) {
          const w = { id: r[0], w: r[1], m: r[2]||'', p: r[3]||'', e: safeJSON(r[4]), s: safeJSON(r[5]), a: safeJSON(r[6]), et: (r[7]||'').slice(0,200) };
          const starred = bookmarks[w.w] ? '#9B4D5A' : '#C8C0B4';
          searchHTML += `<div class="sr-item"><div style="flex:1"><span class="sr-word">${esc(w.w)}</span><span class="sr-meaning">${esc(w.m).slice(0,60)}</span></div><button class="mini-star" style="color:${starred}" onclick='toggleBookmark(${JSON.stringify(w).replace(/'/g, "&apos;")});renderReview(document.getElementById("review-search").value)'>★</button></div>`;
        }
        searchHTML += '</div>';
      }
    } catch(e) { console.error(e); }
  }
  
  let bmHTML = '';
  const filtered = query ? bm.filter(w => w.w.toLowerCase().includes(query.toLowerCase()) || (w.m && w.m.toLowerCase().includes(query.toLowerCase()))) : bm;
  if (filtered.length === 0) {
    bmHTML = `<div class="empty-state"><div class="empty-icon">★</div><p class="empty-text">${bm.length === 0 ? '저장된 단어가 없습니다.' : '검색 결과가 없습니다.'}</p></div>`;
  } else {
    for (const w of filtered) {
      const starred = bookmarks[w.w] ? '#9B4D5A' : '#C8C0B4';
      bmHTML += `
        <div class="review-card" id="rc-${w.id}">
          <div class="review-header" onclick="toggleReviewCard(${w.id})">
            <div style="flex:1"><span class="review-word">${esc(w.w)}</span><span class="review-pron">${esc(w.p || '')}</span></div>
            <button class="mini-star" style="color:${starred}" onclick='event.stopPropagation();toggleBookmark(${JSON.stringify(w).replace(/'/g, "&apos;")});renderReview(document.getElementById("review-search").value)'>★</button>
            <span class="chevron" id="chev-${w.id}">›</span>
          </div>
          <div class="review-detail" id="detail-${w.id}" style="display:none">
            <p class="review-meaning">${esc(w.m)}</p>
            ${w.s?.length ? `<div class="tag-row"><span class="tag-label">유</span>${w.s.map(s => `<span class="syn-tag">${esc(s)}</span>`).join('')}</div>` : ''}
            ${w.e?.length ? w.e.map(e => `<p class="example-text" style="font-style:italic;font-size:13px;color:#5A5348;margin-bottom:4px">"${esc(e)}"</p>`).join('') : ''}
          </div>
        </div>`;
    }
  }
  
  document.getElementById('screen-review').innerHTML = `
    <div class="top-bar">
      <button class="back-btn" onclick="showScreen('home')">← 홈</button>
      <span class="counter">★ ${bm.length}단어</span>
    </div>
    <div class="search-box">
      <span style="font-size:16px;opacity:0.5">🔍</span>
      <input id="review-search" placeholder="단어 검색" value="${esc(query)}" oninput="renderReview(this.value)">
      ${query ? '<button class="clear-btn" onclick="renderReview(\'\')">✕</button>' : ''}
    </div>
    ${searchHTML}${bmHTML}`;
}

function toggleReviewCard(id) {
  const det = document.getElementById(`detail-${id}`);
  const chev = document.getElementById(`chev-${id}`);
  if (det.style.display === 'none') {
    det.style.display = 'block'; chev.classList.add('open');
  } else {
    det.style.display = 'none'; chev.classList.remove('open');
  }
}

// --- Bookmarks & Utils ---
function toggleBookmark(word) {
  if (bookmarks[word.w]) delete bookmarks[word.w];
  else bookmarks[word.w] = { id: word.id, w: word.w, m: word.m, p: word.p, e: word.e, s: word.s, a: word.a, et: word.et };
  localStorage.setItem('vwn-bookmarks', JSON.stringify(bookmarks));
  updateBadge();
}

function updateBadge() {
  const count = Object.keys(bookmarks).length;
  const badge = document.getElementById('bookmark-badge');
  if (badge) {
    badge.textContent = count;
    badge.style.display = count > 0 ? 'block' : 'none';
  }
}

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&apos;');
}
